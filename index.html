<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Élèves — Auto-École</title>
<meta name="theme-color" content="#1a1f3a">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #1a1f3a; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; color: white; font-size: 17px; font-weight: 500; margin-bottom: 6px; opacity: .7; letter-spacing: .05em; }

  #syncStatus { text-align: center; margin-bottom: 12px; font-size: 11px; color: rgba(255,255,255,.5); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #2d7a4f; flex-shrink: 0; }

  .page { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
  .col-wrap { display: flex; flex-direction: column; gap: 12px; }
  .col { border-radius: 14px; padding: 14px 12px 16px; }
  .col-b2  { background: #fef3c7; }
  .col-b1  { background: #c8dff5; }
  .col-etg { background: #d1f5d3; }
  .col-ann { background: #ffffff; border: 1px solid #ddd; }

  .col-title { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1.5px solid rgba(0,0,0,0.12); outline: none; border-radius: 4px; cursor: pointer; }
  .col-title:hover { background: rgba(0,0,0,0.05); }
  .col-title:focus { background: rgba(255,255,255,0.7); padding: 2px 4px; }

  /* En-tête des colonnes Tab/ESys/RDVp */
  .col-header { display: flex; align-items: center; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid rgba(0,0,0,0.1); }
  .col-header-left { flex: 1; display: flex; align-items: center; gap: 4px; }
  .col-header-spacer { width: 16px; margin-right: 6px; } /* checkbox */
  .col-header-handle { width: 16px; margin-right: 6px; } /* handle */
  .col-header-type { width: 36px; text-align: center; font-size: 9px; font-weight: 700; color: #666; }
  .col-header-bm { width: 28px; text-align: center; font-size: 9px; font-weight: 700; color: #666; }
  .col-header-name { flex: 1; }
  .col-header-checks { display: flex; gap: 3px; margin-right: 6px; }
  .col-header-check-label { width: 18px; text-align: center; font-size: 9px; font-weight: 700; color: #666; }
  .col-header-cbts { width: 42px; }

  .sep { height: 1px; background: rgba(0,0,0,0.18); margin: 7px 0; }

  .eleve { display: flex; align-items: center; gap: 4px; padding: 3px 2px; border-radius: 6px; transition: background .1s; }
  .eleve:hover { background: rgba(0,0,0,0.05); }
  .eleve.dragging { opacity: .4; }
  .eleve.drag-over { border-top: 2px solid #4a7fc1; }
  .eleve.checked .label { opacity: .4; text-decoration: line-through; }

  .drag-handle { color: #bbb; font-size: 13px; cursor: grab; user-select: none; flex-shrink: 0; width: 16px; }

  .eleve input[type=checkbox] { appearance: none; -webkit-appearance: none; width: 16px; height: 16px; min-width: 16px; border: 1.5px solid rgba(0,0,0,0.3); border-radius: 4px; background: white; cursor: pointer; position: relative; flex-shrink: 0; }
  .eleve input[type=checkbox]:checked { background: #555; border-color: #555; }
  .eleve input[type=checkbox]:checked::after { content:"✓"; position:absolute; color:white; font-size:10px; top:50%; left:50%; transform:translate(-50%,-50%); }

  /* Type (T) (CS) (AAC) */
  .eleve-type { width: 36px; min-width: 36px; text-align: center; font-size: 11px; color: #444; flex-shrink: 0; }
  /* BM/BEA */
  .eleve-bm { width: 28px; min-width: 28px; text-align: center; font-size: 11px; color: #444; flex-shrink: 0; margin: 0 4px; }

  .label { font-size: 12px; color: #1a1a1a; line-height: 1.35; flex: 1; cursor: pointer; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .label.rouge { color: #c0392b; font-weight: 500; }
  .label.vert  { color: #1a7a2e; font-weight: 500; }

  /* Cases Tab/ESys/RDVp */
  .mini-checks { display: flex; gap: 3px; flex-shrink: 0; }
  .mini-cb { width: 18px; height: 18px; min-width: 18px; border: 1.5px solid rgba(0,0,0,0.35); border-radius: 3px; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #333; user-select: none; flex-shrink: 0; }
  .mini-cb.etat1 { color: #2d7a4f; }
  .mini-cb.etat2 { color: #c0392b; }

  .cbts { display: flex; gap: 3px; flex-shrink: 0; }
  .cbt { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid #aaa; cursor: pointer; }
  .cbt-noir  { background: #333; }
  .cbt-rouge { background: #c0392b; }
  .cbt-vert  { background: #1a7a2e; }
  .cbt.actif { border-color: #333; opacity: 1 !important; }
  .cbt:not(.actif) { opacity: 0.3; }

  .actions { margin-top: 14px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 8px; border: none; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; }
  .btn:hover { opacity: .85; }
  .btn-b1   { background: #4a7fc1; color: white; }
  .btn-b2   { background: #d4a017; color: white; }
  .btn-etg  { background: #2d7a4f; color: white; }
  .btn-ann  { background: #888; color: white; }
  .btn-csv  { background: #555; color: white; }
  .btn-reset { background: rgba(255,255,255,.15); color: white; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:center; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:white; border-radius:14px; padding:22px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-size:15px; margin-bottom:10px; }
  .modal label { display:block; font-size:12px; color:#666; margin-bottom:4px; margin-top:10px; }
  .modal input[type=text] { width:100%; padding:9px 10px; border:1px solid #ccc; border-radius:6px; font-family:inherit; font-size:13px; }
  .hint-box { background:#f5f5f5; border-radius:8px; padding:10px 12px; margin-top:10px; font-size:11.5px; color:#444; line-height:1.8; outline:none; cursor:text; }
  .hint-box:focus { background:#fff; border:1px solid #bbb; }
  .modal-footer { margin-top:16px; display:flex; gap:8px; justify-content:flex-end; }
  .btn-ok { background:#4a7fc1; color:white; }
  .btn-cancel { background:#eee; color:#333; }
  .btn-del { background:#c0392b; color:white; display:none; }

  @media (max-width:640px) { .page { grid-template-columns:1fr; } }
  @media print { body{background:white;} h1{color:#333;} .actions,.drag-handle,.cbts,#syncStatus{display:none;} .col-b2{background:#fef9e0;} .col-b1{background:#dbeeff;} .col-etg{background:#e5fce6;} .col-ann{background:#fff;} }
</style>
</head>
<body>

<h1>AUTO-ÉCOLE — SUIVI ÉLÈVES</h1>
<div id="syncStatus"><div class="sync-dot"></div><span>Données locales</span></div>

<div class="page">
  <div class="col-wrap">
    <div class="col col-b2">
      <div class="col-title" contenteditable="true" onblur="saveTitle(this,'t_b2')" id="t_b2">B+ / AE Ext.</div>
      <div class="col-header">
        <div class="col-header-handle"></div>
        <div style="width:16px;margin-right:4px;"></div>
        <div class="col-header-type" style="font-size:9px;font-weight:700;color:#666;text-align:center;">Fil</div>
        <div class="col-header-bm" style="font-size:9px;font-weight:700;color:#666;text-align:center;">BV</div>
        <div class="col-header-name"></div>
        <div class="mini-checks" style="margin-right:6px;">
          <div class="col-header-check-label">Tab</div>
          <div class="col-header-check-label">ESy</div>
          <div class="col-header-check-label">RDV</div>
        </div>
        <div class="col-header-cbts"></div>
      </div>
      <div id="col_b2" ondragover="onDragOver(event)" ondrop="onDrop(event,'b2')"></div>
    </div>
    <div class="col col-ann">
      <div class="col-title" contenteditable="true" onblur="saveTitle(this,'t_ann')" id="t_ann">Dossiers &lt; 2020 Annulations (Poss)</div>
      <div class="col-header">
        <div class="col-header-handle"></div>
        <div style="width:16px;margin-right:4px;"></div>
        <div class="col-header-type" style="font-size:9px;font-weight:700;color:#666;text-align:center;">Fil</div>
        <div class="col-header-bm" style="font-size:9px;font-weight:700;color:#666;text-align:center;">BV</div>
        <div class="col-header-name"></div>
        <div class="mini-checks" style="margin-right:6px;">
          <div class="col-header-check-label">Tab</div>
          <div class="col-header-check-label">ESy</div>
          <div class="col-header-check-label">RDV</div>
        </div>
        <div class="col-header-cbts"></div>
      </div>
      <div id="col_ann" ondragover="onDragOver(event)" ondrop="onDrop(event,'ann')"></div>
    </div>
  </div>
  <div class="col-wrap">
    <div class="col col-b1">
      <div class="col-title" contenteditable="true" onblur="saveTitle(this,'t_b1')" id="t_b1">B1</div>
      <div class="col-header">
        <div class="col-header-handle"></div>
        <div style="width:16px;margin-right:4px;"></div>
        <div class="col-header-type" style="font-size:9px;font-weight:700;color:#666;text-align:center;">Fil</div>
        <div class="col-header-bm" style="font-size:9px;font-weight:700;color:#666;text-align:center;">BV</div>
        <div class="col-header-name"></div>
        <div class="mini-checks" style="margin-right:6px;">
          <div class="col-header-check-label">Tab</div>
          <div class="col-header-check-label">ESy</div>
          <div class="col-header-check-label">RDV</div>
        </div>
        <div class="col-header-cbts"></div>
      </div>
      <div id="col_b1" ondragover="onDragOver(event)" ondrop="onDrop(event,'b1')"></div>
    </div>
    <div class="col col-etg">
      <div class="col-title" contenteditable="true" onblur="saveTitle(this,'t_etg')" id="t_etg">ETG</div>
      <div class="col-header">
        <div class="col-header-handle"></div>
        <div style="width:16px;margin-right:4px;"></div>
        <div class="col-header-type" style="font-size:9px;font-weight:700;color:#666;text-align:center;">Fil</div>
        <div class="col-header-bm" style="font-size:9px;font-weight:700;color:#666;text-align:center;">BV</div>
        <div class="col-header-name"></div>
        <div class="mini-checks" style="margin-right:6px;">
          <div class="col-header-check-label">Tab</div>
          <div class="col-header-check-label">ESy</div>
          <div class="col-header-check-label">RDV</div>
        </div>
        <div class="col-header-cbts"></div>
      </div>
      <div id="col_etg" ondragover="onDragOver(event)" ondrop="onDrop(event,'etg')"></div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-b2"   onclick="openAdd('b2')">+ B+/AE Ext.</button>
  <button class="btn btn-b1"   onclick="openAdd('b1')">+ B1</button>
  <button class="btn btn-etg"  onclick="openAdd('etg')">+ ETG</button>
  <button class="btn btn-ann"  onclick="openAdd('ann')">+ Ann</button>
  <button class="btn btn-csv"  onclick="exportCSV()">⬇ CSV</button>
  <button class="btn btn-reset" onclick="resetChecks()">☐ Décocher</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Ajouter un élève</h2>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <div style="flex:1">
        <label>Type</label>
        <select id="fType" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px;">
          <option value="">(aucun)</option>
          <option value="(T)">T</option>
          <option value="(CS)">CS</option>
          <option value="(AAC)">AAC</option>
          <option value="(PA)">PA</option>
          <option value="(BGN)">BGN</option>
        </select>
      </div>
      <div style="flex:1">
        <label>Boîte</label>
        <select id="fBM" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px;">
          <option value="">(aucun)</option>
          <option value="BM">BM</option>
          <option value="BEA">BEA</option>
        </select>
      </div>
    </div>
    <label style="margin-top:10px;display:block;">Nom Prénom (+ date, niveau...)</label>
    <input type="text" id="fNom" placeholder="DUPONT Marie (ETG) 12/03/25 *" style="width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px;">
    <label style="margin-top:8px;display:block;font-size:11px;color:#999;">Ligne complète générée :</label>
    <div id="fPreview" style="background:#f0f4ff;border-radius:6px;padding:8px 10px;font-size:12px;color:#333;margin-top:4px;min-height:24px;"></div>
    <div class="hint-box" id="legendeBox" contenteditable="true" onblur="saveLegend()"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn btn-del" id="btnDel" onclick="supprimerEleve()">🗑 Supprimer</button>
      <button class="btn btn-ok" onclick="saveEleve()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const LOCAL_KEY = 'ae_v6';
let data = [];
let targetCol = 'b1';
let editIdx = null;
let dragSrcIdx = null;

function parseEleve(ligne) {
  // Extrait (T), (CS), (AAC), (PA) etc. et BM/BEA du début de ligne
  const typeMatch = ligne.match(/^(@\s+)?\((T|CS|AAC|PA|BGN)\)/);
  const bmMatch = ligne.match(/\b(BM|BEA)\b/);
  let type = '', bm = '', nom = ligne;
  if (typeMatch) {
    type = '(' + typeMatch[2] + ')';
  }
  if (bmMatch) {
    bm = bmMatch[1];
  }
  return { type, bm, nom };
}

function setSync(state, text) {
  document.getElementById('syncDot') && (document.getElementById('syncDot').className = 'sync-dot');
  document.getElementById('syncText') && (document.getElementById('syncText').textContent = text);
}

function load() {
  try {
    const r = localStorage.getItem(LOCAL_KEY);
    data = r ? JSON.parse(r) : getDefaults();
  } catch(e) { data = getDefaults(); }
  ['b1','b2','etg','ann'].forEach(c => {
    const t = localStorage.getItem('title_'+c);
    if (t) document.getElementById('t_'+c).textContent = t;
  });
  const leg = localStorage.getItem('ae_legende');
  document.getElementById('legendeBox').innerHTML = leg || defaultLegend();
}

function saveLocal() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
}

function saveTitle(el, key) { localStorage.setItem('title_'+key, el.textContent); }
function saveLegend() { localStorage.setItem('ae_legende', document.getElementById('legendeBox').innerHTML); }

function defaultLegend() {
  return '<b>Format :</b> @ (T) BM NOM Prénom (ETG) date niveau<br>'
    + '1. <b>@</b> = À jour Qualiopi<br>'
    + '2. <b>(T)</b> Traditionnel | <b>(CS)</b> Supervisée | <b>(AAC)</b> Accompagnée<br>'
    + '3. <b>BM</b> Boîte manuelle | <b>BEA</b> Boîte auto<br>'
    + '4. <b>NOM Prénom</b><br>'
    + '5. <b>Date</b> échec examen<br>'
    + '6. <b>*</b> &nbsp;<b>**</b> &nbsp;<b>***</b> Niveau<br>'
    + '<span style="color:#c0392b;font-weight:600">● Rouge = Bougeons-Nous ! 47</span><br>'
    + '<span style="color:#1a7a2e;font-weight:600">● Vert = Prioritaire (PA) ou Autres</span>';
}

function miniCbClick(gi, field) {
  const cur = data[gi][field] || 0;
  data[gi][field] = (cur + 1) % 3;
  saveLocal();
  render();
}

function renderCol(col, cid) {
  const c = document.getElementById(cid);
  c.innerHTML = '';
  data.filter(e => e.col === col).forEach(e => {
    const gi = data.indexOf(e);
    if (e.sep) {
      c.appendChild(Object.assign(document.createElement('div'), {className:'sep'}));
      return;
    }
    const row = document.createElement('div');
    row.className = 'eleve' + (e.checked ? ' checked' : '');
    row.draggable = true;
    row.dataset.idx = gi;
    row.addEventListener('dragstart', onDragStart);
    row.addEventListener('dragend', onDragEnd);

    // Handle
    const h = document.createElement('span');
    h.className = 'drag-handle';
    h.textContent = '⠿';

    // Checkbox coché/barré
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = e.checked;
    cb.addEventListener('change', () => { data[gi].checked = cb.checked; saveLocal(); render(); });

    // Type (T) (CS) (AAC)
    const typeEl = document.createElement('span');
    typeEl.className = 'eleve-type';
    const typeMatch = e.ligne.match(/\((T|CS|AAC|PA|BGN)\)/);
    typeEl.textContent = typeMatch ? typeMatch[1] : '';

    // BM/BEA
    const bmEl = document.createElement('span');
    bmEl.className = 'eleve-bm';
    const bmMatch = e.ligne.match(/\b(BM|BEA)\b/);
    bmEl.textContent = bmMatch ? bmMatch[1] : '';

    // Nom (ligne complète pour ne rien perdre)
    const lbl = document.createElement('span');
    const couleurClass = e.couleur && e.couleur !== 'noir' ? ' ' + e.couleur : '';
    lbl.className = 'label' + couleurClass;
    typeEl.className = 'eleve-type' + couleurClass;
    bmEl.className = 'eleve-bm' + couleurClass;
    // Afficher uniquement le nom (sans type et BM/BEA)
    let nomAffiche = e.ligne;
    const tMatch = nomAffiche.match(/\((T|CS|AAC|PA|BGN)\)/);
    const bMatch = nomAffiche.match(/\b(BM|BEA)\b/);
    if (tMatch) nomAffiche = nomAffiche.replace(tMatch[0], '').trim();
    if (bMatch) nomAffiche = nomAffiche.replace(new RegExp('\\b'+bMatch[1]+'\\b'), '').trim();
    lbl.textContent = nomAffiche;
    lbl.addEventListener('dblclick', () => openEdit(gi));

    // Mini cases Tab/ESys/RDVp
    const miniChecks = document.createElement('div');
    miniChecks.className = 'mini-checks';
    ['tab','esys','rdvp'].forEach(field => {
      const mc = document.createElement('div');
      mc.className = 'mini-cb' + (e[field] === 1 ? ' etat1' : e[field] === 2 ? ' etat2' : '');
      mc.textContent = e[field] === 1 ? '/' : e[field] === 2 ? '✕' : '';
      mc.addEventListener('click', ev => { ev.stopPropagation(); miniCbClick(gi, field); });
      miniChecks.appendChild(mc);
    });

    // Couleurs
    const cbts = document.createElement('div');
    cbts.className = 'cbts';
    ['noir','rouge','vert'].forEach(clr => {
      const btn = document.createElement('div');
      btn.className = 'cbt cbt-' + clr + ((e.couleur || 'noir') === clr ? ' actif' : '');
      btn.addEventListener('click', ev => { ev.stopPropagation(); data[gi].couleur = clr; saveLocal(); render(); });
      cbts.appendChild(btn);
    });

    row.appendChild(h);
    row.appendChild(cb);
    row.appendChild(typeEl);
    row.appendChild(bmEl);
    row.appendChild(lbl);
    row.appendChild(miniChecks);
    row.appendChild(cbts);
    c.appendChild(row);

    addTouchDrag(row);
  });
}

function render() {
  renderCol('b2','col_b2');
  renderCol('b1','col_b1');
  renderCol('etg','col_etg');
  renderCol('ann','col_ann');
}

function onDragStart(e) { dragSrcIdx = parseInt(this.dataset.idx); this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragEnd() { this.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); }
function onDragOver(e) { e.preventDefault(); const row = e.target.closest('.eleve'); document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); if (row) row.classList.add('drag-over'); }
function onDrop(e, col) {
  e.preventDefault(); if (dragSrcIdx === null) return;
  const row = e.target.closest('.eleve');
  let ti = row ? parseInt(row.dataset.idx) : data.reduce((l,x,i) => x.col === col ? i : l, -1) + 1;
  const item = data.splice(dragSrcIdx, 1)[0]; item.col = col;
  const nt = ti > dragSrcIdx ? ti - 1 : ti; data.splice(nt, 0, item);
  dragSrcIdx = null; saveLocal(); render();
}

function addTouchDrag(row) {
  const handle = row.querySelector('.drag-handle');
  if (!handle) return;
  let clone = null, dragging = false, srcIdx = null;

  handle.addEventListener('touchstart', function(e) {
    dragging = true;
    srcIdx = parseInt(row.dataset.idx);
    const touch = e.touches[0];
    clone = row.cloneNode(true);
    clone.style.cssText = 'position:fixed;opacity:0.8;pointer-events:none;z-index:999;width:'+row.offsetWidth+'px;background:rgba(200,220,255,0.95);border-radius:8px;padding:4px;left:'+touch.clientX+'px;top:'+touch.clientY+'px;';
    document.body.appendChild(clone);
    row.style.opacity = '0.4';
    e.preventDefault();
  }, {passive: false});

  handle.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (clone) { clone.style.left = touch.clientX - 20 + 'px'; clone.style.top = touch.clientY - 20 + 'px'; }
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el ? el.closest('.eleve') : null;
    if (target && target !== row) target.classList.add('drag-over');
  }, {passive: false});

  handle.addEventListener('touchend', function(e) {
    if (!dragging) return;
    dragging = false;
    row.style.opacity = '';
    if (clone) { clone.remove(); clone = null; }
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el ? el.closest('.eleve') : null;
    const colEl = el ? el.closest('[id^="col_"]') : null;
    const col = colEl ? colEl.id.replace('col_','') : data[srcIdx].col;
    let ti = target ? parseInt(target.dataset.idx) : data.reduce((l,x,i) => x.col === col ? i : l, -1) + 1;
    if (srcIdx !== null && ti !== srcIdx) {
      const item = data.splice(srcIdx, 1)[0];
      item.col = col;
      const nt = ti > srcIdx ? ti - 1 : ti;
      data.splice(nt, 0, item);
      saveLocal(); render();
    }
    srcIdx = null;
  }, {passive: true});
}

function buildLigne() {
  const type = document.getElementById('fType').value;
  const bm = document.getElementById('fBM').value;
  const nom = document.getElementById('fNom').value.trim();
  const parts = [type, bm, nom].filter(Boolean);
  const ligne = parts.join(' ');
  document.getElementById('fPreview').textContent = ligne || '—';
  return ligne;
}
document.getElementById('fType') && document.getElementById('fType').addEventListener('change', buildLigne);
document.getElementById('fBM') && document.getElementById('fBM').addEventListener('change', buildLigne);
document.getElementById('fNom') && document.getElementById('fNom').addEventListener('input', buildLigne);

function openAdd(col) {
  targetCol = col; editIdx = null;
  document.getElementById('modalTitle').textContent = 'Ajouter — ' + document.getElementById('t_'+col).textContent;
  document.getElementById('fType').value = '';
  document.getElementById('fBM').value = '';
  document.getElementById('fNom').value = '';
  document.getElementById('fPreview').textContent = '—';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fNom').focus(), 100);
}
function openEdit(idx) {
  editIdx = idx; targetCol = data[idx].col;
  document.getElementById('modalTitle').textContent = "Modifier l'élève";
  const ligne = data[idx].ligne;
  const typeMatch = ligne.match(/\((T|CS|AAC|PA|BGN)\)/);
  const bmMatch = ligne.match(/\b(BM|BEA)\b/);
  const type = typeMatch ? '('+typeMatch[1]+')' : '';
  const bm = bmMatch ? bmMatch[1] : '';
  // Extraire seulement le nom en retirant le type et BM/BEA du début
  let nom = ligne;
  if (type) nom = nom.replace(type, '').trim();
  if (bm) nom = nom.replace(new RegExp('\\b'+bm+'\\b'), '').trim();
  // Nettoyer le @ au début si présent
  nom = nom.replace(/^@\s*/, '').trim();
  document.getElementById('fType').value = type;
  document.getElementById('fBM').value = bm;
  document.getElementById('fNom').value = nom;
  document.getElementById('fPreview').textContent = ligne;
  document.getElementById('btnDel').style.display = 'inline-block';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fNom').focus(), 100);
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editIdx = null;
}
function saveEleve() {
  const type = document.getElementById('fType').value;
  const bm = document.getElementById('fBM').value;
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) { alert("Écris au moins le nom de l'élève."); return; }
  const parts = [type, bm, nom].filter(Boolean);
  const ligne = parts.join(' ');
  if (editIdx !== null) {
    data[editIdx].ligne = ligne;
  } else {
    const li = data.reduce((l,x,i) => x.col === targetCol ? i : l, -1);
    data.splice(li + 1, 0, {col: targetCol, ligne, checked: false, couleur: 'noir', tab: 0, esys: 0, rdvp: 0});
  }
  saveLocal(); closeModal(); render();
}
function supprimerEleve() {
  if (!confirm('Supprimer cet élève ?')) return;
  data.splice(editIdx, 1); saveLocal(); closeModal(); render();
}
function resetChecks() {
  if (!confirm('Décocher tous ?')) return;
  data.forEach(e => e.checked = false);
  saveLocal(); render();
}
function exportCSV() {
  const h = ['Colonne','Ligne','Couleur','Coché','Tab','ESys','RDVp'];
  const r = data.filter(e => !e.sep && e.ligne).map(e => [
    e.col, e.ligne, e.couleur||'noir', e.checked?'Oui':'',
    e.tab||0, e.esys||0, e.rdvp||0
  ]);
  const csv = [h,...r].map(r => r.map(c => '"'+String(c||'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = 'eleves-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) saveEleve();
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
